<script type="py">
import re
import sys, io, traceback
import numpy as np
import sympy as sp
import matplotlib.pyplot as plt
import base64
from js import document, navigator, Blob, URL, window
from pyodide.ffi import create_proxy
ENV = {"np":np,"sp":sp,"__name__":"__main__"}
LIBRERIAS_DISPONIBLES = {
    "numpy",
    "matplotlib",
    "mpl_toolkits",
    "sympy",
    "math",
    "mpmath",
    #--- Ciencia de Datos y Machine Learning ---
    "scikit-learn",  #Nombre oficial del paquete (el import suele ser sklearn)
    "statsmodels",
    "xgboost",
    "lightgbm",
    "xarray",
    # --- Visualización de Datos ---
    "seaborn",
    "bokeh",
    "altair",
    "folium",
    # --- Manejo de Imágenes y Visión ---
    "pillow",        # Procesamiento de imágenes general
    "scikit-image",
    "opencv-python", # cv2
    "imageio",
    # --- Datos Geoespaciales y Astronomía ---
    "geopandas",
    "shapely",
    "cartopy",
    "astropy",
    # --- Utilidades Web, Parsing y Texto ---
    "beautifulsoup4", # Web scraping / parsing HTML
    "requests",       # Manejo de peticiones HTTP
    "urllib3",
    "jinja2",
    "pyyaml",
    "regex",
    "lxml",
    # --- Criptografía, Archivos y Bases de Datos ---
    "cryptography",
    "sqlalchemy",
    "sqlite3",        # Incluida nativamente
    "h5py",
    "pyarrow",
    "duckdb",
    # --- Arquitectura y Validaciones ---
    "pydantic",
    "pytest",
    "anyio",
    "cffi"
}
LIBRERIAS_PROHIBIDAS = {
    "tkinter",
    "customtkinter",
    "PyQt6",
    "PySide6",
    "cv2",
    "opencv",
    "streamlit",
    "manim"
}
current_img = None
# =========================
# EJECUTOR
# =========================
def ejecutar(event):
    global current_img
    console = document.getElementById("console")
    graph = document.getElementById("graph")
    console.innerHTML = ""
    graph.innerHTML = ""
    code = window.current_code or ""
    # 1. Obtenemos el nombre del archivo real desde JS
    filename = window.currentFileName or "archivo_desconocido.py"
    stdout = sys.stdout
    buffer = io.StringIO()
    sys.stdout = buffer
    print(f"Ejecutando script: {filename}\n" + "-"*40)
    estado_grafica = {"detectada": False}
    try:
        bloqueado, reporte = verificar_dependencias(code)
        if reporte:
            console.innerText = (
                "=== Dependencias detectadas ===\n\n"
                + reporte +
                "\n\n==============================\n\n"
            )
        if bloqueado:
            return
        plt.close("all")
        def show_web(*args, **kwargs):
            estado_grafica["detectada"] = True
            global current_img
            for i in plt.get_fignums():
                fig = plt.figure(i)
                buf = io.BytesIO()
                fig.savefig(buf, format="png")
                buf.seek(0)
                img = base64.b64encode(buf.read()).decode()
                current_img = img
                graph.innerHTML += f'<img src="data:image/png;base64,{img}"/>'
        plt.show = show_web
        exec(code, ENV)
        if estado_grafica["detectada"]:
            print(
                "\n--------------Importante----------------\n"
                "Por defecto, las figuras se muestran en el panel de Gráficas. "
                "Para que también aparezcan en línea en la consola, necesitas "
                "desmarcar 'Silenciar gráficos en línea' en el menú de opciones de Gráficos."
            )
        console.innerText = buffer.getvalue() or "OK"
        
            
    except Exception:
        console.innerText = traceback.format_exc()
    finally:
        sys.stdout = stdout
def detectar_imports(codigo):
    imports = set()
    patrones = re.findall(
        r'^\s*(?:from\s+([a-zA-Z0-9_\.]+)\s+import|import\s+([a-zA-Z0-9_\.]+))',
        codigo,
        re.MULTILINE
    )
    for item in patrones:
        lib = item[0] or item[1]
        if lib:
            imports.add(lib.split(".")[0])
    return imports
def verificar_dependencias(codigo):
    imports = detectar_imports(codigo)
    reporte = []
    bloqueado = False
    for lib in sorted(imports):
        if lib in LIBRERIAS_PROHIBIDAS:
            reporte.append(
                f" {lib} no puede ejecutarse dentro del navegador"
            )
            bloqueado = True
        elif lib in LIBRERIAS_DISPONIBLES:
            reporte.append(
                f" {lib}"
            )
        else:
            reporte.append(
                f"⚠ {lib} no está disponible en este entorno"
            )
            bloqueado = True
    return bloqueado, "\n".join(reporte)
# =========================
# BOTONES PYTHON
# =========================
def run(event):
    ejecutar(event)
def save_img(event):
    if not current_img:
        return
    a = document.createElement("a")
    a.href = "data:image/png;base64," + current_img
    a.download = "grafica.png"
    a.click()
async def copy_img(event):
    blob = Blob.new(
        [base64.b64decode(current_img)],
        {"type":"image/png"}
    )
    item = navigator.ClipboardItem.new({"image/png": blob})
    await navigator.clipboard.write([item])
document.getElementById("run").addEventListener("click", create_proxy(run))
document.getElementById("save").addEventListener("click", create_proxy(save_img))
document.getElementById("copy").addEventListener("click", create_proxy(copy_img))
window.pythonReady = True
if window.pythonReady == True:
    console = document.getElementById("console")
    console.innerText = "CDE_User>> trucopagina/TPF/SPYidle/_init_.py loaded correctly"
</script>

<script>

let files = {
    "Sumas de riemann.py": `import numpy as np
import matplotlib.pyplot as plt
#funciones de ejemplo
def f1(x): return x
def f2(x): return x**2 
def f3(x): return np.sin(x)
def f4(x): return np.exp(x)
def f5(x): return 3*x
#listas de ejercicios (funcion, intervalo, n, metodo)
ejercicios = [
    (f1, 0, 1, 4, "izquierda"),
    (f2, 0, 2, 4, "derecha"),
    (f3, 0, np.pi, 6, "izquierda"),
    (f4, 0, 1, 5, "izquierda"),
    (f5, 0, 3, 3, "derecha")
    ]
def suma_riemann(f, a, b, n, metodo="izquierda"):
    dx = (b - a) / n
    x = np.linspace(a, b, n+1)
    if metodo == "izquierda":
        puntos = x[:-1]
    elif metodo == "derecha":
        puntos = x[1:]
    elif metodo == "punto medio":
        puntos = (x[:-1] + x[1:]) / 2 
    else:
        raise ValueError("Metodo no valido")
    suma = np.sum(f(puntos) * dx)
    return suma, x, puntos, dx
#Graficar cada ejercicio
fig, axs = plt.subplots(1, 5, figsize=(20, 4))
for i, (f, a, b, n, metodo) in enumerate(ejercicios):
    suma, x, puntos, dx = suma_riemann(f, a, b, n, metodo)
    X = np.linspace(a, b, 200)
    Y = f(X)
    axs[i].plot(X, Y, 'b', label='f(x)')
    for j in range(n):
        if metodo == "izquierda":
            altura = f(x[j])
            axs[i].bar(x[j], altura, width=dx, align='edge', alpha=0.3, edgecolor='black')
        elif metodo == "derecha":
            altura = f(x[j+1])
            axs[i].bar(x[j], altura, width=dx, align='edge', alpha=0.3, edgecolor='black')
        elif metodo == "punto medio":
            altura = f(puntos[j])
            axs[i].bar(x[j], altura, width=dx, align='edge', alpha=0.3, edgecolor='black')
        axs[i].set_title(f"Ejercicio {i+1}\\nMetodo: {metodo}\\nSuma ≈ {suma:.3f}")
        axs[i].set_xlabel("x")
        axs[i].set_ylabel("f(x)")
        axs[i].legend()
plt.tight_layout()        
plt.show()`
};
let currentFile = "Sumas de riemann.py";
function renderFiles(){
    window.currentFileName = currentFile;
    const list = document.getElementById("fileList");
    list.innerHTML = "";
    for(let name in files){
        let div = document.createElement("div");
        div.className = "file" + (name === currentFile ? " active" : "");
        div.innerText = name;
        div.onclick = () => {
            currentFile = name;
            window.editor.setValue(files[name]);
            renderFiles();
        };
        list.appendChild(div);
    }
}
function createFile(){
    let name = prompt("Nombre del archivo:");
    if(!name) return;
    if(!name.endsWith(".py")) name += ".py";
    files[name] = "# nuevo archivo\n";
    currentFile = name;
    window.editor.setValue(files[name]);
    renderFiles();
}
function savePy(){
    files[currentFile] = window.editor.getValue();

        };

/* ══════════════════════════════════════════════
   MODO NORMAL — helpers
   ══════════════════════════════════════════════ */
let appMode = 'normal'; // 'normal' | 'teach' | 'memo'
let savedCode = '';
let teachDecos = [];
let learnIdx = 0;
let memoChangeHandler = null;

function consoleEl() { return document.getElementById('console'); }
function modeBar()    { return document.getElementById('mode-bar'); }

function setModeBar(mode, controlsHTML) {
  const bar = modeBar();
  bar.className = 'visible ' + mode;
  document.getElementById('mode-bar-title').textContent =
    mode === 'teach' ? '📖 Enseñanza · Sumas de Riemann' : '🧠 Modo memorización · Sumas de Riemann';
  document.getElementById('mode-bar-controls').innerHTML = controlsHTML;
  // push monaco content down
  const padTop = bar.offsetHeight || 36;
  if (window.editor) {
    document.querySelector('.monaco-editor')?.parentElement && (
      window.editor.getDomNode().style.paddingTop = padTop + 'px'
    );
  }
}

function exitMode() {
  appMode = 'normal';
  // restore code
  if (window.editor) {
    window.editor.setValue(savedCode);
    window.editor.updateOptions({ readOnly: false });
    // clear decorations
    teachDecos = window.editor.deltaDecorations(teachDecos, []);
    setTimeout(() => window.editor.layout(), 50);
  }
  // restore console
  const c = consoleEl();
  c.className = '';
  c.innerHTML = '';
  // hide mode bar
  modeBar().className = '';
  // remove memo change listener
  if (memoChangeHandler) { memoChangeHandler.dispose(); memoChangeHandler = null; }
}
window.exitMode = exitMode;

/* ══════════════════════════════════════════════
   MODO ENSEÑANZA — código Riemann en el editor,
   explicación en la consola
   ══════════════════════════════════════════════ */
function enterTeachMode() {
  if (!window.editor) return;
  appMode = 'teach';
  savedCode = window.editor.getValue();
  learnIdx = 0;

  // Load full Riemann code into editor (read-only)
  const fullCode = RIEMANN_LINES.map(l => l.code).join('\n');
  window.editor.setValue(fullCode);
  window.editor.updateOptions({ readOnly: true });

  // Mode bar with prev/next/exit
  setModeBar('teach', `
    <button onclick="teachPrev()" style="background:#1a3a1a;border-color:#2ecc71;color:#2ecc71;">← Anterior</button>
    <span class="step-lbl" id="teach-step-lbl">1 / ${RIEMANN_LINES.length}</span>
    <button onclick="teachNext()" style="background:#1a3a1a;border-color:#2ecc71;color:#2ecc71;">Siguiente →</button>
    <button onclick="exitMode()" class="exit-btn">✕ Salir</button>
  `);

  // Console becomes explanation panel
  const c = consoleEl();
  c.className = 'teach-mode';
  c.innerHTML = `<div id="teach-explain-wrap">
    <div class="teach-prog-track"><div class="teach-prog-fill" id="teach-prog-fill" style="width:0%"></div></div>
    <div id="teach-explain-body"></div>
  </div>`;

  renderTeachLine();
}
window.enterTeachMode = enterTeachMode;

function renderTeachLine() {
  const item  = RIEMANN_LINES[learnIdx];
  const total = RIEMANN_LINES.length;
  const pct   = Math.round(((learnIdx + 1) / total) * 100);
  const lineNo = learnIdx + 1; // 1-based

  // Update step label in mode bar
  const lbl = document.getElementById('teach-step-lbl');
  if (lbl) lbl.textContent = `${lineNo} / ${total}`;

  // Progress bar
  const fill = document.getElementById('teach-prog-fill');
  if (fill) fill.style.width = pct + '%';

  // Highlight line in editor
  teachDecos = window.editor.deltaDecorations(teachDecos, [{
    range: new monaco.Range(lineNo, 1, lineNo, 1),
    options: {
      isWholeLine: true,
      className: 'teach-line-highlight',
      glyphMarginClassName: 'teach-glyph',
      overviewRuler: { color: '#2ecc71', position: monaco.editor.OverviewRulerLane.Full }
    }
  }]);
  window.editor.revealLineInCenter(lineNo);

  // Explanation in console
  const body = document.getElementById('teach-explain-body');
  if (body) body.innerHTML = `
    <div style="display:inline-block;background:#0e639c;color:#fff;font-size:10px;font-weight:bold;padding:2px 8px;border-radius:20px;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;">${item.section}</div>
    <div style="font-size:15px;font-weight:bold;color:#4fc3f7;margin-bottom:8px;">${item.title}</div>
    <div style="font-size:13px;color:#ccc;line-height:1.7;">${item.body}</div>
    ${item.analogy ? `<div style="margin-top:12px;background:#111;border-left:3px solid #f39c12;padding:10px 14px;border-radius:0 6px 6px 0;font-size:13px;color:#f0c060;"><b>💡 Analogía:</b> ${item.analogy}</div>` : ''}
  `;
}

function teachNext() {
  if (learnIdx < RIEMANN_LINES.length - 1) { learnIdx++; renderTeachLine(); }
}
function teachPrev() {
  if (learnIdx > 0) { learnIdx--; renderTeachLine(); }
}
window.teachNext = teachNext;
window.teachPrev = teachPrev;

// Also inject Monaco CSS for highlight
(function injectTeachCSS() {
  const s = document.createElement('style');
  s.textContent = `.teach-line-highlight { background: rgba(46,204,113,0.15) !important; border-left: 3px solid #2ecc71 !important; }`;
  document.head.appendChild(s);
})();

// Keyboard navigation for teach mode
document.addEventListener('keydown', (e) => {
  if (appMode !== 'teach') return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') teachNext();
  if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  teachPrev();
  if (e.key === 'Escape') exitMode();
});

/* ══════════════════════════════════════════════
   MODO MEMORIZACIÓN — editor vacío, usuario escribe,
   evaluación final 1-100
   ══════════════════════════════════════════════ */
function enterMemoMode() {
  if (!window.editor) return;
  appMode = 'memo';
  savedCode = window.editor.getValue();
  teachDecos = window.editor.deltaDecorations(teachDecos, []);

  window.editor.setValue('');
  window.editor.updateOptions({ readOnly: false });
  setTimeout(() => { window.editor.focus(); window.editor.layout(); }, 50);

  setModeBar('memo', `
    <button onclick="finalizeMemo()" style="background:#1a3a1a;border-color:#2ecc71;color:#2ecc71;">✓ Evaluar mi código</button>
    <button onclick="exitMode()" class="exit-btn">✕ Salir sin evaluar</button>
  `);

  const c = consoleEl();
  c.className = 'memo-mode';
  renderMemoLiveConsole(0, 0);

  // Live listener — counts lines, no answers revealed
  memoChangeHandler = window.editor.onDidChangeModelContent(() => {
    if (appMode !== 'memo') return;
    const lines = window.editor.getValue().split('\n');
    const written = lines.filter(l => l.trim() !== '').length;
    const total   = RIEMANN_LINES.length;
    renderMemoLiveConsole(written, total);
  });
}
window.enterMemoMode = enterMemoMode;

function renderMemoLiveConsole(written, total) {
  const c = consoleEl();
  c.innerHTML = `<div id="memo-live-wrap">
    <div style="color:#ce93d8;font-weight:bold;font-size:13px;margin-bottom:10px;">
      🧠 Escribe el programa de Sumas de Riemann desde cero.
    </div>
    <div style="color:#888;font-size:12px;line-height:1.8;margin-bottom:14px;">
      No se mostrarán pistas ni respuestas mientras escribes.<br>
      Cuando termines, pulsa <b style="color:#2ecc71">✓ Evaluar mi código</b> para ver tu puntuación del 1 al 100.
    </div>
    <div class="memo-live-row">
      <div class="memo-live-stat">Líneas escritas: <b>${written}</b></div>
      <div class="memo-live-stat">Objetivo: <b>${total} líneas</b></div>
      <div class="memo-live-stat">Progreso: <b>${Math.min(100,Math.round(written/total*100))}%</b></div>
    </div>
    <div style="background:#222;border-radius:4px;height:4px;overflow:hidden;margin-top:4px;">
      <div style="height:100%;background:linear-gradient(90deg,#9b59b6,#ce93d8);border-radius:4px;width:${Math.min(100,Math.round(written/total*100))}%;transition:width .3s;"></div>
    </div>
  </div>`;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function finalizeMemo() {
  if (appMode !== 'memo') return;
  const userLines  = window.editor.getValue().split('\n');
  const total      = RIEMANN_LINES.length;
  let   points     = 0;
  const breakdown  = [];

  for (let i = 0; i < total; i++) {
    const expected = RIEMANN_LINES[i].code.trimEnd();
    const got      = (userLines[i] || '').trimEnd();
    let status, credit;
    if (got === expected) {
      status = 'ok'; credit = 1;
    } else {
      // Partial credit via Levenshtein similarity
      const maxLen = Math.max(expected.length, got.length, 1);
      const sim    = 1 - levenshtein(got, expected) / maxLen;
      if (sim >= 0.85) { status = 'near'; credit = 0.6; }
      else              { status = 'bad';  credit = 0;   }
    }
    points += credit;
    breakdown.push({ i, expected, got, status });
  }

  const score = Math.round((points / total) * 100);
  const emoji = score >= 90 ? '🏆' : score >= 70 ? '🎯' : score >= 50 ? '📈' : '💪';
  const sClass = score >= 70 ? 's-high' : score >= 45 ? 's-mid' : 's-low';
  const msg = score >= 90 ? '¡Excelente! Dominas el programa completo.' :
              score >= 70 ? 'Muy bien. Repasa las líneas marcadas en rojo.' :
              score >= 50 ? 'Buen intento. Usa el modo de Enseñanza para repasar.' :
              'Sigue practicando. El modo Enseñanza te ayudará a memorizarlo.';

  const badLines = breakdown.filter(b => b.status !== 'ok');
  const breakdownHTML = breakdown.map(b => {
    const safe = b.expected.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const safeGot = b.got.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (b.status === 'ok') {
      return `<div class="bl ok"><span class="bi">${b.i+1}</span><span class="bc">✓ ${safe}</span></div>`;
    } else if (b.status === 'near') {
      return `<div class="bl near"><span class="bi">${b.i+1}</span><span class="bc">≈ ${safe}</span></div>`;
    } else {
      return `<div class="bl bad"><span class="bi">${b.i+1}</span><span class="bc">✗ esperado: ${safe}${b.got ? `<br><span style="color:#888;padding-left:22px;display:block;">  escrito:  ${safeGot}</span>` : ''}</span></div>`;
    }
  }).join('');

  const c = consoleEl();
  c.innerHTML = `<div id="memo-live-wrap">
    <div style="text-align:center;padding:4px 0 10px;">
      <div style="font-size:32px;">${emoji}</div>
      <div class="score-big ${sClass}">${score}<span style="font-size:22px;font-weight:normal;color:#888;">/100</span></div>
      <div style="color:#aaa;font-size:13px;margin-bottom:8px;">${msg}</div>
      <div style="display:flex;gap:16px;justify-content:center;font-size:12px;margin-bottom:10px;flex-wrap:wrap;">
        <span style="color:#2ecc71;">✓ Correctas: <b>${breakdown.filter(b=>b.status==='ok').length}</b></span>
        <span style="color:#f39c12;">≈ Casi correctas: <b>${breakdown.filter(b=>b.status==='near').length}</b></span>
        <span style="color:#e74c3c;">✗ Incorrectas: <b>${badLines.length}</b></span>
        <span style="color:#aaa;">Total: <b>${total}</b></span>
      </div>
    </div>
    <div style="font-size:11px;color:#666;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;">Desglose completo</div>
    <div class="memo-breakdown">${breakdownHTML}</div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
      <button onclick="enterMemoMode()" style="background:#2a1a3a;border-color:#9b59b6;color:#ce93d8;">↺ Intentar de nuevo</button>
      <button onclick="exitMode()" style="background:#444;border-color:#666;">✕ Salir</button>
    </div>
  </div>`;

  // Mark wrong lines in editor with decorations
  const errDecos = badLines.map(b => ({
    range: new monaco.Range(b.i+1,1,b.i+1,1),
    options: {
      isWholeLine: true,
      className: b.status === 'near' ? 'memo-near-line' : 'memo-bad-line',
      overviewRuler: { color: b.status === 'near' ? '#f39c12' : '#e74c3c', position: monaco.editor.OverviewRulerLane.Full }
    }
  }));
  window.editor.deltaDecorations([], errDecos);
  window.editor.updateOptions({ readOnly: true });

  // inject decoration CSS if needed
  if (!document.getElementById('memo-deco-css')) {
    const s = document.createElement('style');
    s.id = 'memo-deco-css';
    s.textContent = `.memo-bad-line{background:rgba(231,76,60,.15)!important;border-left:3px solid #e74c3c!important;}.memo-near-line{background:rgba(243,156,18,.12)!important;border-left:3px solid #f39c12!important;}`;
    document.head.appendChild(s);
  }
}
window.finalizeMemo = finalizeMemo;

// Legacy aliases (por si acaso)
window.openLearn = enterTeachMode;
window.openMemo  = enterMemoMode;
</script>
