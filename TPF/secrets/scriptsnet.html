    <title>Control 322-M | Turnos</title>
    <style>
        :root {
            --primary: #621132;
            --accent: #b49454;
            --success: #28a745;
            --bg: #f0f2f5;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header { text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        h1 { color: var(--primary); margin: 0; font-size: 1.3rem; }
        
        .today-card { background: #fff9db; border: 2px solid var(--accent); padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .names-today { font-weight: bold; color: var(--primary); display: block; margin: 10px 0; font-size: 1.1rem; text-transform: lowercase; }
        
        .btn-whatsapp { background: #25d366; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; max-width: 320px; transition: 0.3s; }
        .btn-whatsapp:hover { background: #128c7e; transform: scale(1.02); }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 10px; font-size: 0.8rem; color: #666; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        .item-student { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #eee; margin: 4px 0; padding: 8px; border-radius: 6px; }
        .item-student.done { background: #e8f5e9; border-color: var(--success); }
        .info-box { display: flex; flex-direction: column; }
        .info-box strong { font-size: 0.85rem; }
        .info-box span { font-size: 0.75rem; color: #999; }
        
        .row-today { background: #fffdf0 !important; border-left: 5px solid var(--accent); }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Control de Asignaciones - Grupo 322-M</h1>

    </div>

    <div class="today-card">

        <button class="btn-whatsapp" onclick="enviarMensaje()">Generar y copiar mensaje</button>

        {id: 55, c: "253107367", n: "ZARATE DE LA CRUZ GUILLERMO"}
    ];

    let nombresPurosHoy = [];

    function registrar(check, key) {
        const item = check.parentElement;
        if (check.checked) {
            item.classList.add('done');
            localStorage.setItem(key, '1');
        } else {
            item.classList.remove('done');
            localStorage.removeItem(key);
        }
    }

    function init() {
        const body = document.getElementById("listaCuerpo");
        const display = document.getElementById("displayHoy");
        const hoy = new Date(); hoy.setHours(0,0,0,0);

        let d = new Date(2026, 4, 7); // Inicio 7 Mayo
        let idx = 29; // Inicia con Moran Lopez Luis Angel

        while (d <= new Date(2026, 6, 31)) {
            if (d.getDay() !== 0 && d.getDay() !== 6) {
                const tr = document.createElement("tr");
                const esHoy = d.getTime() === hoy.getTime();
                const dK = d.toISOString().split('T')[0];
                if (esHoy) tr.className = "row-today";

                let teamHTML = "";
                for (let i = 0; i < 4; i++) {
                    const st = alumnosOficiales[idx % 55];
                    const sK = `chk-${dK}-${st.id}`;
                    const checked = localStorage.getItem(sK) ? 'checked' : '';
                    const cls = checked ? 'done' : '';

                    if (esHoy) nombresPurosHoy.push(st.n.toLowerCase());

                    teamHTML += `
                        <div class="item-student ${cls}">
                            <div class="info-box">
                                <strong>${st.id}. ${st.n}</strong>
                                <span>Ctrl: ${st.c}</span>
                            </div>
                            <input type="checkbox" ${checked} onchange="registrar(this, '${sK}')">
                        </div>`;
                    idx++;
                }
                if (esHoy) display.textContent = nombresPurosHoy.join(" | ");

                tr.innerHTML = `<td>${d.toLocaleDateString('es-MX', {day:'2-digit', month:'short'})}</td><td>${teamHTML}</td>`;
                body.appendChild(tr);
            }
            d.setDate(d.getDate() + 1);
        }
    }

    function enviarMensaje() {
        if (nombresPurosHoy.length === 0) return alert("Hoy no hay asignados.");
        const f = new Date().toLocaleDateString('es-MX', { day: 'numeric', month: 'long' });
        const listado = nombresPurosHoy.map(nombre => `🔹 ${nombre}`).join('\n');
        const msg = `AVISO\n\nAquellos que se quedan el día de hoy (${f}) al la limpieza son:\n\n${listado}\n\nFavor de quedarse al terminar clases.`;
        
        navigator.clipboard.writeText(msg).then(() => alert("Mensaje copiado en minúsculas y listo para enviar."));
    }

    init();
</script>
