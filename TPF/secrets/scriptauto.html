<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control 322-M | Límite 31 Julio</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #621132; 
            --accent: #b49454; 
            --bg: #f4f7f6; 
            --color-s: #25d366;  
            --color-n: #ff4d4d;  
            --color-p: #b388ff;  
            --color-d: #ffc107;  
            --color-sr: #1f4e5b; 
            --color-j: #26a69a;  
            --debug-bg: #fff3e0;
            --debug-border: #ffb74d;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .full-width { grid-column: 1 / -1; }
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); margin-top: 0; }
        
        .debug-panel { 
            background: var(--debug-bg); 
            border: 2px dashed var(--debug-border); 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 5px;
        }
        .debug-flex { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
        
        .student-card { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        
        .status-p { border-color: var(--color-p); background: #f3e5f5; }
        .status-s { border-color: var(--color-s); background: #e8f5e9; }
        .status-n { border-color: var(--color-n); background: #ffebee; color: #b71c1c; }
        .status-d { border-color: var(--color-d); background: #fffde7; }
        .status-sr { border-color: var(--color-sr); background: #e0f2f1; color: #004d40; }
        .status-j { border-color: var(--color-j); background: #e0f7fa; }

        .select-estatus { padding: 6px 10px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; background: white; cursor: pointer; }
        .btn-whatsapp { background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1rem; transition: 0.3s; }
        .btn-whatsapp:hover { background: #128c7e; }
        .btn-debug { background: #e65100; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .history-item { font-size: 0.85rem; padding: 6px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 3px 8px; border-radius: 12px; font-weight: bold; font-size: 0.75rem; color: white; }
        @media (max-width: 600px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card full-width debug-panel">
        <h3 style="margin: 0; color: #e65100; display: flex; align-items: center; gap: 8px;">⚙️ Panel de Desarrollo / Límite de Operación</h3>
        <div class="debug-flex">
            <label style="font-weight: bold; cursor: pointer;">
                <input type="checkbox" id="debugToggle" onchange="alternarModoDebug(this.checked)"> Activar Fecha Simulada
            </label>
            <input type="date" id="debugFechaInput" max="2026-07-31" disabled onchange="actualizarFechaSimulada()" style="padding: 5px; font-weight: bold;">
            <button class="btn-debug" id="btnForzarCambio" onclick="forzarCambioDiaDebug()" disabled>Simular Salto de Día 🗓️</button>
        </div>
    </div>

    <div class="card full-width" style="text-align: center;">
        <h1 style="color: var(--primary); margin: 0;">Gestión 322-M</h1>
        <p id="fechaDisplay" style="font-weight: bold; color: var(--accent); font-size: 1.2rem;"></p>
    </div>

    <div class="card">
        <h2>Equipo de Hoy (Cuadrilla)</h2>
        <div id="equipoHoyContenedor">Cargando...</div>
        <button class="btn-whatsapp" onclick="generarAviso()">📢 Generar Aviso WhatsApp</button>
    </div>

    <div class="card">
        <h2>Archivo Histórico de Reportes</h2>
        <div id="historicoContenedor"></div>
    </div>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = { databaseURL: "https://dbsets-fbf2f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const alumnosBase = [
        {id: 1, n: "AGUILAR SEDAS EDITH"}, {id: 2, n: "AGUSTIN ORTIZ IAN BRANDON"},
        {id: 3, n: "ALVARADO HERNANDEZ BRYANT ALEXIS"}, {id: 4, n: "AVILA VILLALVA VANESSA"},
        {id: 5, n: "CLORIO SANCHEZ HECTOR RAUL"}, {id: 6, n: "DIAZ CONTRERAS LUNA JOACELYN"},
        {id: 7, n: "DIAZ HERNANDEZ EMMANUEL"}, {id: 8, n: "ESCALONA VEGA DORIAN IOREL"},
        {id: 9, n: "ESTEVEZ QUINTANAR DONOVAN ALEJANDRO"}, {id: 10, n: "GABINO GALVAN MIA SOFIA"},
        {id: 11, n: "GALO VALLE YARED"}, {id: 12, n: "GARCIA COLIN LILI YAMILE"},
        {id: 13, n: "GARCIA PACHECO CRISTINA YUNNUEN"}, {id: 14, n: "GARCIA PEREZ GIOVANNI"},
        {id: 15, n: "GARCIA QUIROZ LESLY VALERIA"}, {id: 16, n: "GOMEZ GARCIA ITZEL DONAJI"},
        {id: 17, n: "GONZALEZ TORRES ALAN DONOVAN"}, {id: 18, n: "GUERRA RODRIGUEZ SHARENNY JUNEHI"},
        {id: 19, n: "HERNANDEZ RUIZ OMAR"}, {id: 20, n: "HERRERA CAMACHO ERICK GEOVANI"},
        {id: 21, n: "IBANEZ MARTINEZ SAMANTHA"}, {id: 22, n: "JIMENEZ GARCIA JIMENA JOCELYN"},
        {id: 23, n: "LOPEZ BARAJAS DIEGO EMILIANO"}, {id: 24, n: "LOPEZ MAYEN JUAN MANUEL"},
        {id: 25, n: "MARTINEZ AVENDAÑO LEONEL"}, {id: 26, n: "MAURICIO ATILANO MARIA FERNANDA"},
        {id: 27, n: "MENDEZ URBINA GUADALUPE VALERIA"}, {id: 28, n: "MOLINA CHAVARRIA JESUS ENRIQUE"},
        {id: 29, n: "MONTAÑO BUTANDA LORENA"}, {id: 30, n: "MORAN LOPEZ LUIS ANGEL"},
        {id: 31, n: "MUÑOZ HERNANDEZ DANIEL"}, {id: 32, n: "NAVA MORALES EMMA LETICIA"},
        {id: 33, n: "NAVARRETE CISNEROS AARON"}, {id: 34, n: "OLVERA MEDINA SANTIAGO EMANUEL"},
        {id: 35, n: "ORTEGA LOPEZ EDGAR JAIR"}, {id: 36, n: "PARRA INIESTRA ABRAHAM"},
        {id: 37, n: "PEREZ AGUILAR CRISTIAN JASSIEL"}, {id: 38, n: "PEREZ BECERRA ALEJANDRO"},
        {id: 39, n: "PEREZ RAMOS VALENTINA GUADALUPE"}, {id: 40, n: "PEREZ ROJAS ERICK YUREM"},
        {id: 41, n: "PEREZ VAZQUEZ RODRIGO"}, {id: 42, n: "RAMIREZ BAUTISTA JARED RICARDO"},
        {id: 43, n: "RAMIREZ VAZQUEZ ARATH ΝΕΡΗTALI"}, {id: 44, n: "REYES ISLAS CAMILA"},
        {id: 45, n: "REYES JUAREZ CONSTANZA SUA"}, {id: 46, n: "REYES LUGO ANGEL GABRIEL"},
        {id: 47, n: "RICO CORONA EDUARDO RUBEN"}, {id: 48, n: "RODRIGUEZ CISNEROS RAFAEL"},
        {id: 49, n: "RUISECO ESCALONA DIEGO JESUS"}, {id: 50, n: "RUIZ KREUSCH JORGE ALAN"},
        {id: 51, n: "SANCHEZ CALDERON ALDO"}, {id: 52, n: "SOBERANIS SILVA ALEJANDRO"},
        {id: 53, n: "UGALDE BERNAL GAEL IZAID"}, {id: 54, n: "VALLE LARA ZOE URIEL"},
        {id: 55, n: "ZARATE DE LA CRUZ GUILLERMO"}
    ];

    const mapaEstatus = {
        'p': { texto: "Pendiente", color: "var(--color-p)" },
        's': { texto: "Realizado", color: "var(--color-s)" },
        'n': { texto: "No realizado", color: "var(--color-n)" },
        'd': { texto: "Deficiente", color: "var(--color-d)" },
        'sr': { texto: "Sin registro", color: "var(--color-sr)" },
        'j': { texto: "Falta Justificada", color: "var(--color-j)" }
    };

    let modoDebugActivo = false;
    document.getElementById('debugFechaInput').value = new Date().toISOString().split('T')[0];

    function getHoyISO() {
        if (modoDebugActivo) {
            return document.getElementById('debugFechaInput').value;
        }
        return new Date().toISOString().split('T')[0];
    }

    function getHoyFormat() {
        const iso = getHoyISO();
        const d = new Date(iso + "T00:00:00");
        const opciones = { day: 'numeric', month: 'long', year: 'numeric' };
        return d.toLocaleDateString('es-ES', opciones);
    }

    // ESCUCHADOR PRINCIPAL EN TIEMPO REAL
    db.ref().on('value', (snap) => {
        const data = snap.val() || {};
        procesarFlujoAplicacion(data);
    });

    function procesarFlujoAplicacion(data) {
        const hoyISO = getHoyISO();
        const fechaLimiteISO = "2026-07-31"; // Límite estipulado
        let cola = data.cola_limpieza || [];
        let eq = data.equipo_dia || { fecha: "", integrantes: [] };

        // 1. CONTROL DE INICIO DESDE EL NÚMERO DE LISTA 3
        if (cola.length === 0 && !data.cola_limpieza) {
            let ids = alumnosBase.map(a => a.id);
            // El alumno 3 está en el índice 2 de la matriz alumnosBase
            cola = [...ids.slice(2), ...ids.slice(0, 2)]; 
            db.ref('cola_limpieza').set(cola);
            return;
        }

        // 2. VALIDACIÓN DE LÍMITE DE FECHA (Hasta el 31 de Julio)
        if (hoyISO > fechaLimiteISO) {
            document.getElementById('fechaDisplay').innerText = (modoDebugActivo ? "⚠️ (MODO DEBUG) " : "") + getHoyFormat() + " [FUERA DE PERIODO]";
            document.getElementById('equipoHoyContenedor').innerHTML = `
                <div style="text-align:center; padding:20px; color:#c62828; font-weight:bold; background:#ffebee; border-radius:10px; border:2px dashed #c62828;">
                    🚫 Operación concluida: La fecha actual supera el límite calculable del 31 de julio de 2026.
                </div>`;
            return;
        }

        // CONTROL AUTOMÁTICO DE CAMBIO DE DÍA
        if (eq.fecha !== hoyISO && !modoDebugActivo) {
            const nuevos = cola.slice(0, 4).map(id => ({ id: id, estatus: "p" }));
            eq = { fecha: hoyISO, integrantes: nuevos };
            db.ref('equipo_dia').set(eq);
            return;
        }

        renderHTML(eq, data.historico_limpieza || {});
    }

    function renderHTML(eq, hist) {
        document.getElementById('fechaDisplay').innerText = (modoDebugActivo ? "⚠️ (MODO DEBUG) " : "") + getHoyFormat();
        const cont = document.getElementById('equipoHoyContenedor');
        cont.innerHTML = "";
        
        eq.integrantes.forEach((item, index) => {
            const alu = alumnosBase.find(a => a.id === item.id);
            const estatusActual = item.estatus || 'p';
            
            cont.innerHTML += `
                <div class="student-card status-${estatusActual}">
                    <span><b>${alu.id}.</b> ${alu.n}</span>
                    <select class="select-estatus" onchange="cambiarEstatus(${index}, ${alu.id}, this.value)">
                        <option value="p" ${estatusActual === 'p' ? 'selected' : ''}>⏳ P</option>
                        <option value="s" ${estatusActual === 's' ? 'selected' : ''}>✅ S</option>
                        <option value="n" ${estatusActual === 'n' ? 'selected' : ''}>❌ N</option>
                        <option value="d" ${estatusActual === 'd' ? 'selected' : ''}>⚠️ D</option>
                        <option value="sr" ${estatusActual === 'sr' ? 'selected' : ''}>🔍 SR</option>
                        <option value="j" ${estatusActual === 'j' ? 'selected' : ''}>📝 J</option>
                    </select>
                </div>`;
        });

        const hCont = document.getElementById('historicoContenedor');
        hCont.innerHTML = Object.values(hist).reverse().slice(0,15).map(h => {
            const alu = alumnosBase.find(a => a.id === h.id);
            const infoEst = mapaEstatus[h.estatus] || { texto: "Terminado", color: "#666" };
            return `
                <div class="history-item">
                    <div>
                        <strong>${alu.n}</strong>
                        <br><small style="color:#777;">${h.fecha}</small>
                    </div>
                    <span class="badge" style="background-color: ${infoEst.color};">${infoEst.texto}</span>
                </div>`;
        }).join('');
    }

    function cambiarEstatus(idx, id, nuevoEstatus) {
        db.ref(`equipo_dia/integrantes/${idx}/estatus`).set(nuevoEstatus);
        
        db.ref('cola_limpieza').once('value', s => {
            let colaActual = s.val() || [];
            
            if (nuevoEstatus === 's' || nuevoEstatus === 'd') {
                colaActual = colaActual.filter(i => i !== id);
                db.ref('cola_limpieza').set(colaActual);
                
                db.ref('historico_limpieza').push({ 
                    id: id, 
                    fecha: getHoyFormat(), 
                    estatus: nuevoEstatus 
                });
            } 
            else if (nuevoEstatus === 'n' || nuevoEstatus === 'sr' || nuevoEstatus === 'j') {
                if (!colaActual.includes(id)) {
                    colaActual.unshift(id);
                    db.ref('cola_limpieza').set(colaActual);
                }
            }
        });
    }

    // ================= CONFIGURACIÓN MODO DEBUG =================
    function alternarModoDebug(activo) {
        modoDebugActivo = activo;
        document.getElementById('debugFechaInput').disabled = !activo;
        document.getElementById('btnForzarCambio').disabled = !activo;
        
        db.ref().once('value', snap => procesarFlujoAplicacion(snap.val() || {}));
    }

    function actualizarFechaSimulada() {
        if (!modoDebugActivo) return;
        db.ref().once('value', snap => procesarFlujoAplicacion(snap.val() || {}));
    }

    function forzarCambioDiaDebug() {
        const fechaSimuladaISO = getHoyISO();
        const fechaLimiteISO = "2026-07-31";

        if (fechaSimuladaISO > fechaLimiteISO) {
            alert("❌ No se puede simular el salto: La fecha seleccionada sobrepasa el límite del 31 de Julio de 2026.");
            return;
        }
        
        db.ref().once('value', s => {
            const data = s.val() || {};
            let cola = data.cola_limpieza || [];
            const nuevosIntegrantes = cola.slice(0, 4).map(id => ({ id: id, estatus: "p" }));
            
            const nuevoEquipo = {
                fecha: fechaSimuladaISO,
                integrantes: nuevosIntegrantes
            };
            
            db.ref('equipo_dia').set(nuevoEquipo).then(() => {
                alert(`📆 Éxito: Se simuló el cambio de día a la fecha: ${getHoyFormat()}`);
            });
        });
    }

    function generarAviso() {
        const elementos = document.querySelectorAll('.student-card');
        const lineasAlumnos = Array.from(elementos).map(el => {
            const nombre = el.querySelector('span').textContent.trim();
            const estatusLetra = el.querySelector('select').value.toUpperCase();
            return `🔹 ${nombre} -> [Estatus: ${estatusLetra}]`;
        });
        
        const fecha = getHoyFormat();
        const mensaje = `LOGÍSTICA DE LIMPIEZA 322-M\n\nReporte diario del (${fecha}):\n\n${lineasAlumnos.join('\n')}\n\nNota: Los alumnos con estatus N, SR y J repetirán bloque en la próxima jornada académica.`;

        navigator.clipboard.writeText(mensaje).then(() => {
            alert("✅ Reporte copiado.");
        }).catch(err => console.error('Error: ', err));
    }
</script>
</body>
</html>
