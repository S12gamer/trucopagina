<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control 322-M | Final</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #621132; --accent: #b49454; --success: #25d366; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .full-width { grid-column: 1 / -1; }
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); margin-top: 0; }
        
        .student-card { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 8px;
        }
        .student-card.completado { border-color: var(--success); background: #e8f5e9; }
        
        .btn-whatsapp { 
            background: #25d366; color: white; border: none; padding: 12px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;
            font-size: 1rem; transition: 0.3s;
        }
        .btn-whatsapp:hover { background: #128c7e; }
        
        .btn-check { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .history-item { font-size: 0.8rem; padding: 5px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        @media (max-width: 600px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card full-width" style="text-align: center;">
        <h1 style="color: var(--primary); margin: 0;">Gestión 322-M</h1>
        <p id="fechaDisplay" style="font-weight: bold; color: var(--accent);"></p>
    </div>

    <div class="card">
        <h2>Equipo de Hoy</h2>
        <div id="equipoHoyContenedor">Cargando...</div>
        <button class="btn-whatsapp" onclick="generarAviso()">📢 Generar Aviso WhatsApp</button>
    </div>

    <div class="card">
        <h2>Archivo Histórico</h2>
        <div id="historicoContenedor"></div>
    </div>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = { databaseURL: "https://dbsets-fbf2f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const alumnosBase = [
        {id: 1, n: "AGUILAR SEDAS EDITH"}, {id: 2, n: "AGUSTIN ORTIZ IAN BRANDON"},
        {id: 3, n: "ALVARADO HERNANDEZ BRYANT ALEXIS"}, {id: 4, n: "AVILA VILLALVA VANESSA"},
        {id: 5, n: "CLORIO SANCHEZ HECTOR RAUL"}, {id: 6, n: "DIAZ CONTRERAS LUNA JOACELYN"},
        {id: 7, n: "DIAZ HERNANDEZ EMMANUEL"}, {id: 8, n: "ESCALONA VEGA DORIAN IOREL"},
        {id: 9, n: "ESTEVEZ QUINTANAR DONOVAN ALEJANDRO"}, {id: 10, n: "GABINO GALVAN MIA SOFIA"},
        {id: 11, n: "GALO VALLE YARED"}, {id: 12, n: "GARCIA COLIN LILI YAMILE"},
        {id: 13, n: "GARCIA PACHECO CRISTINA YUNNUEN"}, {id: 14, n: "GARCIA PEREZ GIOVANNI"},
        {id: 15, n: "GARCIA QUIROZ LESLY VALERIA"}, {id: 16, n: "GOMEZ GARCIA ITZEL DONAJI"},
        {id: 17, n: "GONZALEZ TORRES ALAN DONOVAN"}, {id: 18, n: "GUERRA RODRIGUEZ SHARENNY JUNEHI"},
        {id: 19, n: "HERNANDEZ RUIZ OMAR"}, {id: 20, n: "HERRERA CAMACHO ERICK GEOVANI"},
        {id: 21, n: "IBANEZ MARTINEZ SAMANTHA"}, {id: 22, n: "JIMENEZ GARCIA JIMENA JOCELYN"},
        {id: 23, n: "LOPEZ BARAJAS DIEGO EMILIANO"}, {id: 24, n: "LOPEZ MAYEN JUAN MANUEL"},
        {id: 25, n: "MARTINEZ AVENDAÑO LEONEL"}, {id: 26, n: "MAURICIO ATILANO MARIA FERNANDA"},
        {id: 27, n: "MENDEZ URBINA GUADALUPE VALERIA"}, {id: 28, n: "MOLINA CHAVARRIA JESUS ENRIQUE"},
        {id: 29, n: "MONTAÑO BUTANDA LORENA"}, {id: 30, n: "MORAN LOPEZ LUIS ANGEL"},
        {id: 31, n: "MUÑOZ HERNANDEZ DANIEL"}, {id: 32, n: "NAVA MORALES EMMA LETICIA"},
        {id: 33, n: "NAVARRETE CISNEROS AARON"}, {id: 34, n: "OLVERA MEDINA SANTIAGO EMANUEL"},
        {id: 35, n: "ORTEGA LOPEZ EDGAR JAIR"}, {id: 36, n: "PARRA INIESTRA ABRAHAM"},
        {id: 37, n: "PEREZ AGUILAR CRISTIAN JASSIEL"}, {id: 38, n: "PEREZ BECERRA ALEJANDRO"},
        {id: 39, n: "PEREZ RAMOS VALENTINA GUADALUPE"}, {id: 40, n: "PEREZ ROJAS ERICK YUREM"},
        {id: 41, n: "PEREZ VAZQUEZ RODRIGO"}, {id: 42, n: "RAMIREZ BAUTISTA JARED RICARDO"},
        {id: 43, n: "RAMIREZ VAZQUEZ ARATH ΝΕΡΗTALI"}, {id: 44, n: "REYES ISLAS CAMILA"},
        {id: 45, n: "REYES JUAREZ CONSTANZA SUA"}, {id: 46, n: "REYES LUGO ANGEL GABRIEL"},
        {id: 47, n: "RICO CORONA EDUARDO RUBEN"}, {id: 48, n: "RODRIGUEZ CISNEROS RAFAEL"},
        {id: 49, n: "RUISECO ESCALONA DIEGO JESUS"}, {id: 50, n: "RUIZ KREUSCH JORGE ALAN"},
        {id: 51, n: "SANCHEZ CALDERON ALDO"}, {id: 52, n: "SOBERANIS SILVA ALEJANDRO"},
        {id: 53, n: "UGALDE BERNAL GAEL IZAID"}, {id: 54, n: "VALLE LARA ZOE URIEL"},
        {id: 55, n: "ZARATE DE LA CRUZ GUILLERMO"}
    ];

    function getHoyFormat() {
        const d = new Date();
        const opciones = { day: 'numeric', month: 'long' };
        return d.toLocaleDateString('es-ES', opciones);
    }

    db.ref().on('value', (snap) => {
        const data = snap.val() || {};
        const hoyISO = new Date().toISOString().split('T')[0];
        let cola = data.cola_limpieza || [];
        let eq = data.equipo_dia || { fecha: "", integrantes: [] };

        // Inicialización (Solo la primera vez)
        if (cola.length === 0 && !data.cola_limpieza) {
            let ids = alumnosBase.map(a => a.id);
            cola = [...ids.slice(29), ...ids.slice(0, 29)]; // Moran Lopez es el 30 (indice 29)
            db.ref('cola_limpieza').set(cola);
            return;
        }

        // Cambio de día
        if (eq.fecha !== hoyISO) {
            const nuevos = cola.slice(0, 4).map(id => ({ id: id, hecho: false }));
            eq = { fecha: hoyISO, integrantes: nuevos };
            db.ref('equipo_dia').set(eq);
        }

        renderHTML(eq, data.historico_limpieza || {});
    });

    function renderHTML(eq, hist) {
        document.getElementById('fechaDisplay').innerText = getHoyFormat();
        const cont = document.getElementById('equipoHoyContenedor');
        cont.innerHTML = "";
        
        eq.integrantes.forEach((item, index) => {
            const alu = alumnosBase.find(a => a.id === item.id);
            cont.innerHTML += `
                <div class="student-card ${item.hecho ? 'completado' : ''}">
                    <span><b>${alu.id}.</b> ${alu.n}</span>
                    ${!item.hecho ? `<button class="btn-check" onclick="marcar(${index}, ${alu.id})">✔</button>` : '<span>✅</span>'}
                </div>`;
        });

        const hCont = document.getElementById('historicoContenedor');
        hCont.innerHTML = Object.values(hist).reverse().slice(0,15).map(h => {
            const alu = alumnosBase.find(a => a.id === h.id);
            return `<div class="history-item"><span>${alu.n}</span><b>${h.fecha}</b></div>`;
        }).join('');
    }

    function marcar(idx, id) {
        db.ref(`equipo_dia/integrantes/${idx}/hecho`).set(true);
        db.ref('cola_limpieza').once('value', s => {
            let c = s.val().filter(i => i !== id);
            db.ref('cola_limpieza').set(c);
        });
        db.ref('historico_limpieza').push({ id: id, fecha: getHoyFormat() });
    }

   function generarAviso() {
        // Obtenemos los nombres directamente del recuadro de "Equipo de Hoy"
        const elementos = document.querySelectorAll('.student-card span b');
        const nombres = Array.from(elementos).map(el => {
            // Limpiamos el texto para quitar el número de lista y dejar solo el nombre en minúsculas
            let nombreLimpio = el.parentElement.textContent.replace(/^\d+\.\s/, '').trim().toLowerCase();
            return `🔹 ${nombreLimpio}`;
        });
        
        const fecha = getHoyFormat();
        
        // Construimos el mensaje de texto plano
        const mensaje = `AVISO

Aquellos que se quedan el día de hoy (${fecha}) a la limpieza son:

${nombres.join('\n')}

Favor de quedarse al terminar clases.`;

        // Lógica para copiar al portapapeles
        navigator.clipboard.writeText(mensaje).then(() => {
            alert("✅ Aviso copiado al portapapeles. Ya puedes pegarlo en WhatsApp.");
        }).catch(err => {
            console.error('Error al copiar: ', err);
            alert("No se pudo copiar automáticamente. Intenta seleccionarlo manualmente.");
        });
    }
</script>
</body>
</html>
