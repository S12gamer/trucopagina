<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control 322-M | Gestión de Turnos</title>
    <style>
        :root {
            --primary: #621132;
            --accent: #b49454;
            --success: #25d366;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        
        .header { text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 15px; }
        h1 { color: var(--primary); margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Panel de Acción */
        .action-card { 
            background: #fffdf0; border: 2px solid var(--accent); padding: 20px; 
            border-radius: 12px; margin-bottom: 25px; text-align: center;
            position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .status-info { font-weight: bold; color: var(--primary); display: block; margin-bottom: 15px; font-size: 1.1rem; }
        
        .btn-whatsapp { 
            background: var(--success); color: white; border: none; padding: 14px 25px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; 
            transition: 0.3s; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-whatsapp:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .btn-whatsapp:hover:not(:disabled) { background: #128c7e; transform: scale(1.01); }

        /* Buscador */
        .search-container { margin-bottom: 20px; }
        .search-input { 
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; 
            font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .search-input:focus { border-color: var(--accent); }

        /* Lista */
        .student-grid { display: flex; flex-direction: column; gap: 10px; }
        .student-item { 
            display: flex; align-items: center; justify-content: space-between; 
            background: white; border: 1px solid #eee; padding: 12px 15px; 
            border-radius: 10px; transition: 0.2s; cursor: pointer;
        }
        .student-item:hover { border-color: var(--accent); background: #fafafa; }
        .student-item.selected { background: #e8f5e9; border-color: var(--success); }
        
        .info-box { display: flex; flex-direction: column; }
        .info-box strong { font-size: 0.95rem; color: #333; }
        .info-box span { font-size: 0.8rem; color: #888; }
        
        input[type="checkbox"] { 
            width: 22px; height: 22px; cursor: pointer; accent-color: var(--success);
        }

        .badge {
            background: var(--primary); color: white; padding: 2px 8px; 
            border-radius: 12px; font-size: 0.7rem; margin-right: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Control de Asignaciones 322-M</h1>
        <p>Selección de equipos de limpieza</p>
    </div>

    <div class="action-card">
        <span class="status-info" id="contadorTxt">Seleccionados: 0 / 4</span>
        <button class="btn-whatsapp" id="btnWhastapp" onclick="enviarMensaje()" disabled>
            <span></span> Generar y Copiar Mensaje
        </button>
    </div>

    <div class="search-container">
        <input type="text" id="buscador" class="search-input" placeholder="Buscar por nombre o número de lista..." onkeyup="filtrar()">

    <div id="listaContenedor" class="student-grid">

</div>

    ];

    let seleccionados = [];

    // Cargar lista de alumnos
    function cargarLista() {
        const contenedor = document.getElementById("listaContenedor");
        alumnos.forEach(alumno => {
            const item = document.createElement("div");
            item.className = "student-item";
            item.id = `card-${alumno.id}`;
            item.onclick = () => alternarSeleccion(alumno.id);

            item.innerHTML = `
                <div class="info-box">
                    <strong><span class="badge">${alumno.id}</span> ${alumno.n}</strong>
                    <span>Control: ${alumno.c}</span>
                </div>
                <input type="checkbox" id="chk-${alumno.id}" onchange="event.stopPropagation(); alternarSeleccion(${alumno.id})">
            `;
            contenedor.appendChild(item);
        });
    }

    // Lógica de selección
    function alternarSeleccion(id) {
    const checkbox = document.getElementById(`chk-${id}`);
    const card = document.getElementById(`card-${id}`);
    
    // Si hicimos clic en el div (no en el input), nosotros volteamos el check
    if (event.target.tagName !== 'INPUT') {
        checkbox.checked = !checkbox.checked;
    }

    const alumno = alumnos.find(a => a.id === id);
    const nombreEnMinusculas = alumno.n.toLowerCase();

    if (checkbox.checked) {
        // Solo agregamos si NO está ya en la lista (evita duplicados por si acaso)
        if (!seleccionados.includes(nombreEnMinusculas)) {
            seleccionados.push(nombreEnMinusculas);
            card.classList.add('selected');
        }
    } else {
        seleccionados = seleccionados.filter(nombre => nombre !== nombreEnMinusculas);
        card.classList.remove('selected');
    }

    actualizarIU();
}

    function actualizarIU() {
        const contadorTxt = document.getElementById("contadorTxt");
        const btnWhastapp = document.getElementById("btnWhastapp");
        
        contadorTxt.textContent = `Seleccionados: ${seleccionados.length} / 4`;
        
        // El botón se activa al tener al menos 1, pero se ve mejor con 4
        btnWhastapp.disabled = seleccionados.length === 0;

        if(seleccionados.length === 4) {
            contadorTxt.style.color = "var(--success)";
        } else {
            contadorTxt.style.color = "var(--primary)";
        }
    }

    function filtrar() {
        const termino = document.getElementById("buscador").value.toLowerCase();
        const items = document.querySelectorAll(".student-item");

        items.forEach(item => {
            const texto = item.innerText.toLowerCase();
            item.style.display = texto.includes(termino) ? "flex" : "none";
        });
    }

    function enviarMensaje() {
        if (seleccionados.length === 0) return;

        const hoy = new Date().toLocaleDateString('es-MX', { day: 'numeric', month: 'long' });
        const listado = seleccionados.map(n => `🔹 ${n}`).join('\n');
        
        const mensaje = `AVISO\n\nAquellos que se quedan el día de hoy (${hoy}) a la limpieza son:\n\n${listado}\n\nFavor de quedarse al terminar clases.\n\n(Dudas,aclaraciones,etc consultar con el respectivo)`;

        navigator.clipboard.writeText(mensaje).then(() => {
            alert("Mensaje copiado puedes llevarlo a whatsapp");
        });
    }

    // Inicializar
    cargarLista();
</script>
